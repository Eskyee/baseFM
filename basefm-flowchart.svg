<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="1200" fill="url(#bgGrad)" rx="20"/>

  <!-- Title -->
  <text x="450" y="55" text-anchor="middle" fill="white" font-size="28" font-weight="bold">baseFM Platform Overview</text>
  <text x="450" y="80" text-anchor="middle" fill="#888" font-size="14">Onchain Radio on Base - Feature Map</text>

  <!-- ==================== -->
  <!-- ROW 1: Entry Point -->
  <!-- ==================== -->
  <rect x="325" y="110" width="250" height="60" rx="30" fill="url(#purpleBlue)" filter="url(#glow)"/>
  <text x="450" y="145" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Open baseFM App</text>

  <!-- Arrow down -->
  <line x1="450" y1="170" x2="450" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#666"/></marker></defs>

  <!-- ==================== -->
  <!-- ROW 2: Homepage -->
  <!-- ==================== -->
  <rect x="250" y="200" width="400" height="80" rx="16" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="450" y="230" text-anchor="middle" fill="white" font-size="16" font-weight="600">Homepage</text>
  <text x="450" y="252" text-anchor="middle" fill="#888" font-size="12">Live streams, events, quick links</text>
  <text x="450" y="268" text-anchor="middle" fill="#666" font-size="11">Shows what's live or guides you to schedule</text>

  <!-- Arrows splitting from Homepage -->
  <!-- Left branch -->
  <line x1="330" y1="280" x2="150" y2="330" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Center-left -->
  <line x1="400" y1="280" x2="350" y2="330" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Center-right -->
  <line x1="500" y1="280" x2="550" y2="330" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Right branch -->
  <line x1="570" y1="280" x2="750" y2="330" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== -->
  <!-- ROW 3: Main Features -->
  <!-- ==================== -->

  <!-- Live Radio -->
  <rect x="50" y="330" width="200" height="70" rx="14" fill="#1A1A1A" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="80" cy="352" r="5" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="150" y="357" text-anchor="middle" fill="white" font-size="14" font-weight="600">Live Radio</text>
  <text x="150" y="377" text-anchor="middle" fill="#888" font-size="11">DJs stream live music</text>
  <text x="150" y="392" text-anchor="middle" fill="#666" font-size="10">RTMP in, HLS out</text>

  <!-- Schedule -->
  <rect x="260" y="330" width="180" height="70" rx="14" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="350" y="357" text-anchor="middle" fill="white" font-size="14" font-weight="600">Schedule</text>
  <text x="350" y="377" text-anchor="middle" fill="#888" font-size="11">Upcoming shows</text>
  <text x="350" y="392" text-anchor="middle" fill="#666" font-size="10">See who's on next</text>

  <!-- Events -->
  <rect x="460" y="330" width="180" height="70" rx="14" fill="#1A1A1A" stroke="#9333ea" stroke-width="1.5"/>
  <text x="550" y="357" text-anchor="middle" fill="white" font-size="14" font-weight="600">Events</text>
  <text x="550" y="377" text-anchor="middle" fill="#888" font-size="11">Strobe Soundsystem</text>
  <text x="550" y="392" text-anchor="middle" fill="#666" font-size="10">Lineup, venue, details</text>

  <!-- Shop -->
  <rect x="660" y="330" width="180" height="70" rx="14" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="750" y="357" text-anchor="middle" fill="white" font-size="14" font-weight="600">Shop</text>
  <text x="750" y="377" text-anchor="middle" fill="#888" font-size="11">shop.basefm.space</text>
  <text x="750" y="392" text-anchor="middle" fill="#666" font-size="10">Merch + onchain perks</text>

  <!-- Section divider -->
  <line x1="50" y1="430" x2="850" y2="430" stroke="#1A1A1A" stroke-width="1"/>
  <text x="450" y="455" text-anchor="middle" fill="#666" font-size="11" font-style="italic">Connect Wallet to unlock more features</text>

  <!-- Arrow down -->
  <line x1="450" y1="462" x2="450" y2="490" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== -->
  <!-- ROW 4: Wallet Connect -->
  <!-- ==================== -->
  <rect x="300" y="490" width="300" height="55" rx="28" fill="url(#purpleBlue)"/>
  <text x="450" y="522" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Connect Wallet (Coinbase)</text>

  <!-- Arrows from wallet -->
  <line x1="350" y1="545" x2="150" y2="590" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="545" x2="370" y2="590" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="545" x2="550" y2="590" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="545" x2="750" y2="590" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== -->
  <!-- ROW 5: Connected Features -->
  <!-- ==================== -->

  <!-- Wallet Page -->
  <rect x="50" y="590" width="200" height="80" rx="14" fill="#1A1A1A" stroke="#0052FF" stroke-width="1.5"/>
  <text x="150" y="617" text-anchor="middle" fill="white" font-size="14" font-weight="600">Wallet Page</text>
  <text x="150" y="637" text-anchor="middle" fill="#0052FF" font-size="11">ETH + RAVE balance</text>
  <text x="150" y="653" text-anchor="middle" fill="#888" font-size="10">Buy crypto on Coinbase</text>
  <text x="150" y="665" text-anchor="middle" fill="#888" font-size="10">Swap on Uniswap + Chart</text>

  <!-- Community -->
  <rect x="270" y="590" width="200" height="80" rx="14" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="370" y="617" text-anchor="middle" fill="white" font-size="14" font-weight="600">Community</text>
  <text x="370" y="637" text-anchor="middle" fill="#9333ea" font-size="11">5,000 RAVE to join</text>
  <text x="370" y="653" text-anchor="middle" fill="#888" font-size="10">Member profiles</text>
  <text x="370" y="665" text-anchor="middle" fill="#888" font-size="10">Token-gated access</text>

  <!-- Messages -->
  <rect x="490" y="590" width="160" height="80" rx="14" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="570" y="617" text-anchor="middle" fill="white" font-size="14" font-weight="600">Messages</text>
  <text x="570" y="637" text-anchor="middle" fill="#888" font-size="11">Chat with members</text>
  <text x="570" y="653" text-anchor="middle" fill="#888" font-size="10">Wallet-to-wallet</text>

  <!-- Dashboard -->
  <rect x="670" y="590" width="170" height="80" rx="14" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="755" y="617" text-anchor="middle" fill="white" font-size="14" font-weight="600">Dashboard</text>
  <text x="755" y="637" text-anchor="middle" fill="#888" font-size="11">DJ controls</text>
  <text x="755" y="653" text-anchor="middle" fill="#888" font-size="10">Create + manage</text>
  <text x="755" y="665" text-anchor="middle" fill="#888" font-size="10">streams</text>

  <!-- Section divider -->
  <line x1="50" y1="700" x2="850" y2="700" stroke="#1A1A1A" stroke-width="1"/>

  <!-- ==================== -->
  <!-- ROW 6: More Pages -->
  <!-- ==================== -->
  <text x="450" y="730" text-anchor="middle" fill="#666" font-size="12">More Pages</text>

  <!-- Gallery -->
  <rect x="60" y="750" width="160" height="55" rx="12" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="140" y="775" text-anchor="middle" fill="white" font-size="13" font-weight="600">Gallery</text>
  <text x="140" y="793" text-anchor="middle" fill="#888" font-size="10">Photos + collectibles</text>

  <!-- Archive -->
  <rect x="240" y="750" width="160" height="55" rx="12" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="320" y="775" text-anchor="middle" fill="white" font-size="13" font-weight="600">Archive</text>
  <text x="320" y="793" text-anchor="middle" fill="#888" font-size="10">Past shows + recordings</text>

  <!-- DJs -->
  <rect x="420" y="750" width="160" height="55" rx="12" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="500" y="775" text-anchor="middle" fill="white" font-size="13" font-weight="600">DJs</text>
  <text x="500" y="793" text-anchor="middle" fill="#888" font-size="10">Artist profiles</text>

  <!-- Agency -->
  <rect x="600" y="750" width="160" height="55" rx="12" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="680" y="775" text-anchor="middle" fill="white" font-size="13" font-weight="600">Agency</text>
  <text x="680" y="793" text-anchor="middle" fill="#888" font-size="10">Booking + partnerships</text>

  <!-- ==================== -->
  <!-- ROW 7: This Week's Updates -->
  <!-- ==================== -->
  <line x1="50" y1="840" x2="850" y2="840" stroke="#1A1A1A" stroke-width="1"/>

  <rect x="50" y="860" width="800" height="40" rx="10" fill="url(#purpleBlue)" opacity="0.15"/>
  <text x="450" y="886" text-anchor="middle" fill="white" font-size="16" font-weight="bold">What's New This Week</text>

  <!-- Update items -->
  <!-- Col 1 -->
  <rect x="60" y="915" width="250" height="50" rx="10" fill="#1A1A1A"/>
  <circle cx="82" cy="940" r="8" fill="#22c55e"/>
  <text x="82" y="944" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
  <text x="100" y="934" fill="white" font-size="12" font-weight="600">PWA Fixed on iPhone</text>
  <text x="100" y="950" fill="#888" font-size="10">No more navbar bleed-through</text>

  <rect x="60" y="975" width="250" height="50" rx="10" fill="#1A1A1A"/>
  <circle cx="82" cy="1000" r="8" fill="#22c55e"/>
  <text x="82" y="1004" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
  <text x="100" y="994" fill="white" font-size="12" font-weight="600">New Homepage Design</text>
  <text x="100" y="1010" fill="#888" font-size="10">Cleaner, simpler, mobile-first</text>

  <rect x="60" y="1035" width="250" height="50" rx="10" fill="#1A1A1A"/>
  <circle cx="82" cy="1060" r="8" fill="#22c55e"/>
  <text x="82" y="1064" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>
  <text x="100" y="1054" fill="white" font-size="12" font-weight="600">Compact Mobile Nav</text>
  <text x="100" y="1070" fill="#888" font-size="10">Fits on any phone screen</text>

  <!-- Col 2 -->
  <rect x="330" y="915" width="250" height="50" rx="10" fill="#1A1A1A"/>
  <circle cx="352" cy="940" r="8" fill="#22c55e"/>
  <text x="352" y="944" text-anchor="middle" fill="white" font-size="10" font-weight="bold">4</text>
  <text x="370" y="934" fill="white" font-size="12" font-weight="600">Wallet Page Upgrade</text>
  <text x="370" y="950" fill="#888" font-size="10">ETH + RAVE balance + chart</text>

  <rect x="330" y="975" width="250" height="50" rx="10" fill="#1A1A1A"/>
  <circle cx="352" cy="1000" r="8" fill="#22c55e"/>
  <text x="352" y="1004" text-anchor="middle" fill="white" font-size="10" font-weight="bold">5</text>
  <text x="370" y="994" fill="white" font-size="12" font-weight="600">Fixed Buy Crypto Link</text>
  <text x="370" y="1010" fill="#888" font-size="10">Now goes to Coinbase properly</text>

  <rect x="330" y="1035" width="250" height="50" rx="10" fill="#1A1A1A"/>
  <circle cx="352" cy="1060" r="8" fill="#22c55e"/>
  <text x="352" y="1064" text-anchor="middle" fill="white" font-size="10" font-weight="bold">6</text>
  <text x="370" y="1054" fill="white" font-size="12" font-weight="600">RAVE Price Chart</text>
  <text x="370" y="1070" fill="#888" font-size="10">GeckoTerminal embedded</text>

  <!-- Col 3 -->
  <rect x="600" y="915" width="240" height="50" rx="10" fill="#1A1A1A"/>
  <circle cx="622" cy="940" r="8" fill="#22c55e"/>
  <text x="622" y="944" text-anchor="middle" fill="white" font-size="10" font-weight="bold">7</text>
  <text x="640" y="934" fill="white" font-size="12" font-weight="600">Event Page Update</text>
  <text x="640" y="950" fill="#888" font-size="10">Cleaner lineup, no times yet</text>

  <rect x="600" y="975" width="240" height="50" rx="10" fill="#1A1A1A"/>
  <circle cx="622" cy="1000" r="8" fill="#22c55e"/>
  <text x="622" y="1004" text-anchor="middle" fill="white" font-size="10" font-weight="bold">8</text>
  <text x="640" y="994" fill="white" font-size="12" font-weight="600">Live Streaming Ready</text>
  <text x="640" y="1010" fill="#888" font-size="10">RTMP to HLS via Mux</text>

  <rect x="600" y="1035" width="240" height="50" rx="10" fill="#1A1A1A"/>
  <circle cx="622" cy="1060" r="8" fill="#22c55e"/>
  <text x="622" y="1064" text-anchor="middle" fill="white" font-size="10" font-weight="bold">9</text>
  <text x="640" y="1054" fill="white" font-size="12" font-weight="600">Shop Integration</text>
  <text x="640" y="1070" fill="#888" font-size="10">Direct link to Shopify store</text>

  <!-- Footer -->
  <text x="450" y="1130" text-anchor="middle" fill="#666" font-size="12">Built on Base | Coinbase Smart Wallet | RAVE Token | Mux Streaming</text>
  <text x="450" y="1155" text-anchor="middle" fill="#444" font-size="11">basefm.space</text>

  <!-- Tech badges -->
  <rect x="280" y="1170" width="70" height="22" rx="11" fill="#1A1A1A"/>
  <text x="315" y="1185" text-anchor="middle" fill="#888" font-size="9">Next.js</text>
  <rect x="360" y="1170" width="60" height="22" rx="11" fill="#1A1A1A"/>
  <text x="390" y="1185" text-anchor="middle" fill="#888" font-size="9">Base</text>
  <rect x="430" y="1170" width="60" height="22" rx="11" fill="#1A1A1A"/>
  <text x="460" y="1185" text-anchor="middle" fill="#888" font-size="9">Mux</text>
  <rect x="500" y="1170" width="70" height="22" rx="11" fill="#1A1A1A"/>
  <text x="535" y="1185" text-anchor="middle" fill="#888" font-size="9">Supabase</text>
</svg>
